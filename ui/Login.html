<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursery Login | Sprout & Soil</title>
    <link rel="stylesheet" href="login-styles.css">
</head>
<body>

<div class="login-container">
    <h2>Welcome!</h2>
    <p>Sign in to the CCC Marketplace</p>
    
    <form action="/login-processing-script" method="POST">
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="green@thumb.com" required>
        </div>
        
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <button type="submit">Enter the Plant Nursery</button>
    </form>

    <div class="footer-links">
        <a href="#">Forgot password?</a> • <a href="register.html">Create an account</a>
    </div>
</div>

</body>
</html>
