{% extends 'admin/_base.html' %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<section class="card hero" style="margin-bottom:20px;">
    <div>
        <h1>Dashboard</h1>
        <p class="muted">Welcome back, {{ current_user.full_name }}.</p>
    </div>
</section>

<div class="stat-grid">
    <div class="stat-card">
        <div class="stat-card__value">{{ pending_orders }}</div>
        <div class="stat-card__label">Pending orders</div>
    </div>
    <div class="stat-card">
        <div class="stat-card__value">{{ total_orders }}</div>
        <div class="stat-card__label">Total orders</div>
    </div>
    <div class="stat-card">
        <div class="stat-card__value">{{ total_plants }}</div>
        <div class="stat-card__label">Plants in catalogue</div>
    </div>
</div>
{% endblock %}
