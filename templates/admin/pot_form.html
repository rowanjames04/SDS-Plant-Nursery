{% extends 'admin/_base.html' %}
{% block title %}{{ "Edit" if pot else "New" }} Pot{% endblock %}

{% block content %}
<header class="admin-page-header">
    <div>
        <p class="page-header__eyebrow">Pots</p>
        <h1>{{ "Edit" if pot else "New" }} Pot</h1>
    </div>
    <a class="button-link button-secondary" href="{{ url_for('admin.pots') }}" style="width:auto;">Back to pots</a>
</header>

<section class="card">
    <form method="post" class="form">
        <div class="input-group">
            <label>Size (mm)</label>
            <input type="number" name="size" value="{{ pot.size if pot else '' }}" required>
        </div>
        <div>
            <button type="submit">{{ "Save" if pot else "Create" }}</button>
        </div>
    </form>
</section>
{% endblock %}
