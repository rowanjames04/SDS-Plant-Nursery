<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursery Login | Sprout & Soil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Login</h1>
            <p class="muted">Sign in to the nursery system.</p>

            <form class="form" action="{{ url_for('login') }}" method="POST">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="green@thumb.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit">Login</button>
            </form>

            <p><a href="{{ url_for('register') }}">Create an account</a></p>
        </section>
    </main>
</body>
</html>
