<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Little Jill's Plant Nursery</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    {% include '_header.html' %}

    <main class="container">
        <div class="auth-wrap">
            <div class="page-header">
                <p class="page-header__eyebrow">❁ &ensp; Welcome back</p>
                <h1>Sign in</h1>
            </div>

            <div class="card">
                <form class="form" action="{{ url_for('login') }}" method="POST">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="green@thumb.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit">Sign in</button>
                </form>

                <p class="auth-form-footer">
                    Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
                </p>
            </div>
        </div>
    </main>
    {% include '_footer.html' %}
</body>
</html>
