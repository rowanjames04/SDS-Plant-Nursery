<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Little Jill's Plant Nursery</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    {% include '_header.html' %}

    <main class="container">
        <div class="auth-wrap">
            <div class="page-header">
                <p class="page-header__eyebrow">❁ &ensp; Join us</p>
                <h1>Create account</h1>
            </div>

            <div class="card">
                <form class="form" action="{{ url_for('register') }}" method="POST">
                    <div class="input-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" placeholder="Jane Smith" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="green@thumb.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="input-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm-password" required>
                    </div>

                    <button type="submit">Create account</button>
                </form>

                <p class="auth-form-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
            </div>
        </div>
    </main>
</body>
</html>
