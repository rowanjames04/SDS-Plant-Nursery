<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: white; border-radius: 8px; overflow: hidden; }
    .header { background: #2d6a4f; padding: 30px; text-align: center; }
    .header h1 { color: white; margin: 0; font-size: 24px; }
    .body { padding: 30px; color: #333; }
    .body h2 { color: #2d6a4f; }
    .footer { background: #f4f4f4; padding: 20px; text-align: center; font-size: 12px; color: #888; }
    .btn { display: inline-block; background: #2d6a4f; color: white; padding: 12px 24px; border-radius: 4px; text-decoration: none; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>CCC Plant Nursery</h1>
    </div>
    <div class="body">
      <h2>Welcome, {{ user.full_name }}!</h2>
      <p>Your account has been successfully created. You can now:</p>
      <ul>
        <li>Browse our plant catalogue</li>
        <li>Save plants to your wishlist</li>
        <li>Place and track orders</li>
      </ul>
      <a href="{{ url_for('home', _external=True) }}" class="btn">Start Shopping</a>
    </div>
    <div class="footer">
      <p>CCC Plant Nursery &mdash; If you did not create this account, please ignore this email.</p>
    </div>
  </div>
</body>
</html>
